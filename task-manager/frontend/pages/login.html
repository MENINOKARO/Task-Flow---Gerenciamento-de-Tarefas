<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .tech-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>

<body class="bg-slate-200 flex items-center justify-center min-h-screen">

    <div class="flex w-[900px] h-[550px] bg-white rounded-2xl shadow-xl overflow-hidden">

        <!-- CONTAINER ESQUERDO -->
        <div class="w-1/2 p-10 flex flex-col justify-center">

            <h1 class="text-3xl font-semibold text-slate-800 mb-2">
                Bem-vindo
            </h1>

            <p class="text-slate-500 mb-6">
                Entre para continuar
            </p>

            <form class="space-y-4">

                <div>
                    <label class="text-sm text-slate-600">E-mail</label>
                    <input type="email" placeholder="seu email"
                        class="w-full mt-1 p-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="text-sm text-slate-600">Senha</label>
                    <input type="password" placeholder="********"
                        class="w-full mt-1 p-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg transition font-semibold">
                    Entrar
                </button>

                <div id="msg-feedback" class="hidden p-3 rounded-md text-sm font-medium mb-4 text-center"></div>

                <a href="register.html"
                    class="block text-center w-full border border-blue-600 text-blue-600 hover:bg-blue-600 hover:text-white p-3 rounded-lg transition font-medium">
                    Criar conta
                </a>

            </form>

            <a href="recover.html" class="text-xs text-slate-400 mt-6 text-center block hover:underline">
                Esqueceu sua senha?
            </a>

        </div>

        <!-- CONTAINER DIREITO -->
        <div class="w-1/2 bg-blue-100 flex items-center justify-center">

            <div class="px-10">

                
                <h2 class="tech-title text-5xl text-blue-700 leading-tight mb-6 tracking-wider">
                    Organize <br>
                    suas <br>
                    tarefas
                </h2>

                
                <p class="text-sm text-slate-600 max-w-xs leading-relaxed">
                    Planeje seu dia com mais clareza e mantenha o controle de tudo com simplicidade.
                </p>

            </div>

        </div>

    </div>

    <script type="module" src="../src/js/auth/login.js"></script>
</body>

</html>
