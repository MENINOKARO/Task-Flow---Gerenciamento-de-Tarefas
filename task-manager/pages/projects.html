<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Meus Projetos</title>
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-[#F8FAFC] text-slate-800 antialiased">

    <div class="flex flex-col h-screen">
        <header class="flex items-center justify-between px-8 py-4 bg-white border-b border-slate-200">
            <div class="flex items-center gap-3">
                <div
                    class="bg-blue-600 text-white p-2 rounded-lg flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="ph ph-chart-bar text-xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-blue-900">TaskFlow</span>
            </div>
            <div class="flex items-center gap-3">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User" class="w-9 h-9 rounded-full" />
                <div class="text-left">
                    <p id="userNameDisplay" class="text-xs font-bold text-slate-900">Usuário</p>
                    <p id="userEmailDisplay" class="text-[10px] text-slate-500">email</p>
                </div>
                <button id="logoutBtn"
                    class="ml-4 p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                    <i class="ph ph-sign-out text-lg"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-6xl mx-auto">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-900">Meus Projetos</h1>
                        <p class="text-sm text-slate-500 mt-1">Selecione um projeto ou crie um novo</p>
                    </div>
                </div>

                <div id="projects-grid"
                    class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/src/js/projects/projects.js"></script>
</body>

</html>
