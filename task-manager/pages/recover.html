<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha</title>
  <link rel="stylesheet" href="/src/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-200 flex items-center justify-center h-screen">

  <div class="flex w-[900px] h-[550px] bg-white rounded-2xl shadow-xl overflow-hidden">

    <!-- CONTAINER ESQUERDO -->
    <div class="w-1/2 p-10 flex flex-col justify-center">

      <h1 class="text-3xl font-semibold mb-2">Recuperar senha</h1>
      <p class="text-slate-500 mb-6">Digite seu e-mail para receber o link</p>

      <form class="space-y-4">

        <div>
          <label class="text-sm">E-mail</label>
          <input type="email" placeholder="seu email"
            class="w-full mt-1 p-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <button
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition">
          Enviar link
        </button>

        <a href="login.html"
          class="block text-center border border-blue-600 text-blue-600 py-3 rounded-lg hover:bg-blue-50 transition">
          Voltar para login
        </a>

      </form>

    </div>

    <!-- CONTAINER DIREITO -->
    <div class="w-1/2 bg-blue-100 flex flex-col justify-center items-center text-center p-8">

      <h1 class="text-5xl text-blue-600 leading-tight" style="font-family: 'Orbitron', sans-serif;">
        Recupere<br>sua<br>conta
      </h1>

      <p class="text-slate-600 mt-6 text-sm max-w-xs">
        Enviaremos um link para redefinir sua senha de forma rápida e segura.
      </p>

    </div>

  </div>

</body>
</html>
